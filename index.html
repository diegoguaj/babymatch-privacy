<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Privacy Policy — BabyMatch</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --coral:      #FF6B6B;
      --coral-soft: #FFE8E8;
      --coral-mid:  #FF9494;
      --yellow:     #FFD93D;
      --green:      #6BCB77;
      --blue:       #74B3CE;
      --pink:       #FFB3C1;
      --bg:         #FFF9F5;
      --bg2:        #FFF3EC;
      --text:       #2D2D2D;
      --muted:      #8A7F7A;
      --border:     #F0E6DF;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Lora', Georgia, serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.8;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 10% 0%, rgba(255,107,107,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 90% 100%, rgba(116,179,206,0.10) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 50% 50%, rgba(255,217,61,0.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    .hearts {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .heart {
      position: absolute;
      opacity: 0;
      animation: floatHeart linear infinite;
      font-size: 14px;
      filter: blur(0.5px);
    }
    .heart:nth-child(1)  { left: 8%;   animation-delay: 0s;   animation-duration: 18s; font-size: 10px; }
    .heart:nth-child(2)  { left: 18%;  animation-delay: 3s;   animation-duration: 22s; font-size: 16px; }
    .heart:nth-child(3)  { left: 32%;  animation-delay: 7s;   animation-duration: 16s; font-size: 8px;  }
    .heart:nth-child(4)  { left: 50%;  animation-delay: 1s;   animation-duration: 25s; font-size: 12px; }
    .heart:nth-child(5)  { left: 65%;  animation-delay: 5s;   animation-duration: 19s; font-size: 10px; }
    .heart:nth-child(6)  { left: 78%;  animation-delay: 9s;   animation-duration: 21s; font-size: 14px; }
    .heart:nth-child(7)  { left: 88%;  animation-delay: 2s;   animation-duration: 17s; font-size: 9px;  }
    .heart:nth-child(8)  { left: 42%;  animation-delay: 12s;  animation-duration: 23s; font-size: 11px; }
    @keyframes floatHeart {
      0%   { bottom: -5%; opacity: 0; transform: translateX(0) scale(0.8) rotate(0deg); }
      10%  { opacity: 0.25; }
      50%  { transform: translateX(20px) scale(1) rotate(15deg); }
      90%  { opacity: 0.15; }
      100% { bottom: 105%; opacity: 0; transform: translateX(-10px) scale(0.9) rotate(-10deg); }
    }
    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 720px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }
    header {
      position: relative;
      text-align: center;
      padding: 60px 0 48px;
      animation: fadeDown 0.7s ease both;
    }
    .logo-mark {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .logo-name {
      font-family: 'Quicksand', sans-serif;
      font-weight: 700;
      font-size: 22px;
      color: var(--text);
      letter-spacing: -0.3px;
    }
    .logo-name span { color: var(--coral); }
    header h1 {
      font-family: 'Quicksand', sans-serif;
      font-size: clamp(28px, 6vw, 42px);
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.5px;
      line-height: 1.2;
      margin-bottom: 16px;
    }
    .header-pill {
      display: inline-block;
      background: var(--coral-soft);
      color: var(--coral);
      font-family: 'Quicksand', sans-serif;
      font-weight: 600;
      font-size: 13px;
